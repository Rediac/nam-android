name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force init submodules
        run: |
          rm -rf app/src/main/cpp/NeuralAmpModelerCore
          git submodule sync
          git submodule update --init --recursive --force --depth 1
          ls -la app/src/main/cpp/NeuralAmpModelerCore/ || echo "Submodule dir not found, cloning manually..."
          if [ ! -d "app/src/main/cpp/NeuralAmpModelerCore/NAM" ]; then
            echo "Manual clone..."
            rm -rf app/src/main/cpp/NeuralAmpModelerCore
            git clone --depth 1 https://github.com/sdatkinson/NeuralAmpModelerCore.git app/src/main/cpp/NeuralAmpModelerCore
            cd app/src/main/cpp/NeuralAmpModelerCore
            git submodule update --init --recursive --depth 1
            cd -
          fi
          ls -la app/src/main/cpp/NeuralAmpModelerCore/NAM/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nam-player-debug
          path: app/build/outputs/apk/debug/*.apk
