name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NeuralAmpModelerCore
        run: |
          echo "Descargando NeuralAmpModelerCore..."
          wget -q https://github.com/sdatkinson/NeuralAmpModelerCore/archive/refs/heads/main.zip -O /tmp/core.zip
          unzip -q /tmp/core.zip -d /tmp/
          rm -rf app/src/main/cpp/NeuralAmpModelerCore
          mkdir -p app/src/main/cpp/NeuralAmpModelerCore
          cp -r /tmp/NeuralAmpModelerCore-main/* app/src/main/cpp/NeuralAmpModelerCore/
          
          echo "Descargando Eigen..."
          wget -q https://gitlab.com/libeigen/eigen/-/archive/master/eigen-master.zip -O /tmp/eigen.zip
          unzip -q /tmp/eigen.zip -d /tmp/
          rm -rf app/src/main/cpp/NeuralAmpModelerCore/Dependencies/eigen
          mkdir -p app/src/main/cpp/NeuralAmpModelerCore/Dependencies/eigen
          cp -r /tmp/eigen-master/* app/src/main/cpp/NeuralAmpModelerCore/Dependencies/eigen/
          
          echo "Contenido de Eigen:"
          ls -la app/src/main/cpp/NeuralAmpModelerCore/Dependencies/eigen/
          echo "¿Existe Eigen/Dense?"
          find app/src/main/cpp/NeuralAmpModelerCore/Dependencies/eigen -name "Dense" -type f 2>/dev/null || echo "No se encontró Eigen/Dense"
          
          echo "Archivos del Core:"
          ls -la app/src/main/cpp/NeuralAmpModelerCore/NAM/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nam-player-debug
          path: app/build/outputs/apk/debug/*.apk
